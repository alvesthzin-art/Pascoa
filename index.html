<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Páscoa CIE Engrecon 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000; 
        }
        
        .invert-logo {
            filter: brightness(0) invert(1);
            max-height: 60px;
            width: auto;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
    </style>
</head>
<body class="text-white antialiased">

    <nav class="p-6 flex justify-start items-center bg-zinc-950 border-b border-gray-900">
        <img src="img/logo.png" alt="CIE Engrecon Logo" class="invert-logo">
    </nav>

    <header class="py-12 px-6 text-center bg-zinc-950">
        <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter italic">
            Acompanhe como foi a <span class="text-orange-500">Páscoa</span> 
            <br> na <span class="text-orange-500">CIE Engrecon</span>
        </h1>
        <div class="mt-6 w-20 h-1.5 bg-orange-500 mx-auto rounded-full"></div>
    </header>

    <main class="max-w-[1400px] mx-auto py-12 px-6">
        <div class="flex flex-wrap justify-center gap-8">
            <div class="flex-none w-full sm:w-[320px] lg:w-[400px] overflow-hidden rounded-xl border border-gray-800 bg-zinc-900 transition-all duration-500 hover:border-orange-500">
                <img src="img/foto1.jpeg" class="w-full h-[500px] object-cover">
            </div>
            <div class="flex-none w-full sm:w-[320px] lg:w-[400px] overflow-hidden rounded-xl border border-gray-800 bg-zinc-900 transition-all duration-500 hover:border-orange-500">
                <img src="img/foto2.jpeg" class="w-full h-[500px] object-cover">
            </div>
            <div class="flex-none w-full sm:w-[320px] lg:w-[400px] overflow-hidden rounded-xl border border-gray-800 bg-zinc-900 transition-all duration-500 hover:border-orange-500">
                <img src="img/foto3.jpeg" class="w-full h-[500px] object-cover">
            </div>
            <div class="flex-none w-full sm:w-[320px] lg:w-[400px] overflow-hidden rounded-xl border border-gray-800 bg-zinc-900 transition-all duration-500 hover:border-orange-500">
                <img src="img/foto4.jpeg" class="w-full h-[500px] object-cover">
            </div>
            <div class="flex-none w-full sm:w-[320px] lg:w-[400px] overflow-hidden rounded-xl border border-gray-800 bg-zinc-900 transition-all duration-500 hover:border-orange-500">
                <img src="img/foto5.jpeg" class="w-full h-[500px] object-cover">
            </div>
            <div class="flex-none w-full sm:w-[320px] lg:w-[400px] overflow-hidden rounded-xl border border-gray-800 bg-zinc-900 transition-all duration-500 hover:border-orange-500">
                <img src="img/foto6.jpeg" class="w-full h-[500px] object-cover">
            </div>
            <div class="flex-none w-full sm:w-[320px] lg:w-[400px] overflow-hidden rounded-xl border border-gray-800 bg-zinc-900 transition-all duration-500 hover:border-orange-500">
                <img src="img/foto7.jpeg" class="w-full h-[500px] object-cover">
            </div>
            <div class="flex-none w-full sm:w-[320px] lg:w-[400px] overflow-hidden rounded-xl border border-gray-800 bg-zinc-900 transition-all duration-500 hover:border-orange-500">
                <img src="img/foto8.jpeg" class="w-full h-[500px] object-cover">
            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-gray-900 text-center bg-zinc-950">
        <p class="text-gray-500 text-xs font-bold tracking-[0.4em] uppercase">
            CIE <span class="text-orange-500">ENGRECON</span> &copy; 2026
        </p>
    </footer>

</body>
</html>
