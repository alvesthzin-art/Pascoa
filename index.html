<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Páscoa CIE Engrecon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="py-12 text-center bg-white shadow-sm">
        <h1 class="text-4xl font-bold text-orange-600">Páscoa na CIE Engrecon</h1>
        <p class="mt-4 text-lg text-gray-600 max-w-2xl mx-auto px-4">
            Celebrando momentos de união e alegria com nossa equipe. Confira os registros dessa data especial!
        </p>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            
            <div class="overflow-hidden rounded-xl shadow-lg bg-white transition hover:scale-105">
                <img src="LINK_DA_FOTO_1.jpg" alt="Momento Páscoa" class="w-full h-64 object-cover">
                <div class="p-4">
                    <p class="text-sm font-medium text-gray-500">Integração da Equipe</p>
                </div>
            </div>

            <div class="overflow-hidden rounded-xl shadow-lg bg-white transition hover:scale-105">
                <img src="LINK_DA_FOTO_2.jpg" alt="Momento Páscoa" class="w-full h-64 object-cover">
                <div class="p-4">
                    <p class="text-sm font-medium text-gray-500">Entrega de Brindes</p>
                </div>
            </div>

            <div class="overflow-hidden rounded-xl shadow-lg bg-white transition hover:scale-105">
                <img src="LINK_DA_FOTO_3.jpg" alt="Momento Páscoa" class="w-full h-64 object-cover">
                <div class="p-4">
                    <p class="text-sm font-medium text-gray-500">Comemoração</p>
                </div>
            </div>

            </div>
    </main>

    <footer class="py-8 text-center text-gray-400 text-sm">
        &copy; 2026 CIE Engrecon
    </footer>

</body>
</html>
